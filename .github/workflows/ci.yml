name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
      - name: generate-check
        # ADR-0004: committed tool schemas must match the arg structs.
        run: go generate ./... && git diff --exit-code
      - name: build
        run: go build ./...
      - name: vet
        run: go vet ./...
      - name: test (race + coverage)
        # Coverage is reported, not gated: a hard threshold rewards line-count
        # tests over behavior (see docs/10-testing.md).
        run: go test -race -cover ./...

  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
      - name: short fuzz (Project)
        run: go test -run '^$' -fuzz '^FuzzProject$' -fuzztime 30s ./internal/core

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
